<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Управление практикой PRO</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Изменён путь к style.css -->
    <link rel="stylesheet" href="/web/style.css">
</head>
<body>

<div class="container">
    <div class="main-card">
        <h2 class="mb-4">📝 Редактор данных практики</h2>

        <!-- Блок загрузки -->
        <div id="loadingBlock" class="text-center py-5">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Загрузка...</span>
            </div>
            <p class="mt-2 text-muted">Загрузка списка студентов...</p>
        </div>

        <!-- Блок ошибки -->
        <div id="errorBlock" class="alert alert-danger" style="display:none;">
            <h5>❌ Ошибка загрузки</h5>
            <p id="errorMessage"></p>
            <button onclick="retryLoadStudents()" class="btn btn-outline-danger btn-sm">🔄 Повторить</button>
        </div>

        <!-- Основной интерфейс (изначально скрыт) -->
        <div id="mainInterface" style="display:none;">
            <div class="row g-3 align-items-end mb-4">
                <div class="col-md-6">
                    <label class="form-label">Выберите студента из списка:</label>
                    <select id="studentSelect" class="form-select">
                        <option value="">-- Выберите студента --</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Или введите ID:</label>
                    <input type="number" id="practiceId" class="form-control" value="1">
                </div>
                <div class="col-md-3">
                    <button onclick="loadData()" class="btn btn-primary w-100">📥 Загрузить данные</button>
                </div>
            </div>

            <div id="result" class="alert alert-info py-2 text-center small mb-3" style="display:none"></div>

            <hr>

            <div id="formContainer" style="display:none">
                
                <div class="section-title">Данные студента</div>
                <div class="row g-3">
                    <div class="col-md-8">
                        <label class="form-label">ФИО обучающегося</label>
                        <input id="fio" class="form-control">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Дата рождения</label>
                        <input id="birth_date" class="form-control" placeholder="ДД.ММ.ГГГГ">
                    </div>
                </div>

                <div class="section-title">Специальность и модуль</div>
                <div class="row g-3">
                    <div class="col-md-3">
                        <label class="form-label">Код специальности</label>
                        <input id="spec_code" class="form-control">
                    </div>
                    <div class="col-md-9">
                        <label class="form-label">Наименование специальности</label>
                        <input id="spec_name" class="form-control">
                    </div>
                    <div class="col-md-8">
                        <label class="form-label">Наименование модуля (ПМ)</label>
                        <input id="module_name" class="form-control">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Часов практики</label>
                        <input id="hours" class="form-control">
                    </div>
                </div>

                <div class="section-title">Сроки прохождения (ПП)</div>
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">Начало (День / Месяц / Год)</label>
                        <div class="input-group">
                            <input id="start_day" class="form-control" placeholder="08">
                            <input id="start_month" class="form-control" placeholder="декабря">
                            <input id="start_year" class="form-control" placeholder="2025">
                        </div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Конец (День / Месяц / Год)</label>
                        <div class="input-group">
                            <input id="end_day" class="form-control" placeholder="21">
                            <input id="end_month" class="form-control" placeholder="декабря">
                            <input id="end_year" class="form-control" placeholder="2025">
                        </div>
                    </div>
                </div>

                <div class="section-title">Руководитель от колледжа</div>
                <div class="row g-3">
                    <div class="col-md-8">
                        <label class="form-label">ФИО преподавателя</label>
                        <input id="teacher_fio" class="form-control">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Телефон</label>
                        <input id="teacher_phone" class="form-control">
                    </div>
                </div>

                <div class="section-title">Место практики</div>
                <div class="row g-3">
                    <div class="col-12">
                        <label class="form-label">Название организации</label>
                        <textarea id="org_name" class="form-control" rows="2"></textarea>
                    </div>
                    <div class="col-md-8">
                        <label class="form-label">Адрес организации</label>
                        <input id="org_address" class="form-control">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Помещения</label>
                        <input id="rooms" class="form-control">
                    </div>
                </div>

                <div class="section-title">Ответственные от организации</div>
                <div class="row g-3">
                    <div class="col-md-3">
                        <label class="form-label">Должность рук. Орг.</label>
                        <input id="org_boss_post" class="form-control">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">ФИО рук. Орг.</label>
                        <input id="org_boss_fio" class="form-control">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Телефон</label>
                        <input id="org_boss_phone" class="form-control">
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">Инициалы</label>
                        <input id="org_boss_initials" class="form-control">
                    </div>
                </div>

                <div class="section-title">Лицо, ответственное за практику</div>
                <div class="row g-3 mb-4">
                    <div class="col-md-4">
                        <label class="form-label">Должность</label>
                        <input id="resp_post" class="form-control">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">ФИО ответственного</label>
                        <input id="resp_fio" class="form-control">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Телефон</label>
                        <input id="resp_phone" class="form-control">
                    </div>
                </div>

                <div class="card p-3 mb-4 bg-light shadow-sm">
                    <h6 class="mb-3">📄 Какие документы генерируем?</h6>
                    <div class="row">
                        <div class="col-md-6">
                            <div class="form-check">
                                <input class="form-check-input doc-checkbox" type="checkbox" value="Аттестационный лист производственная.docx" id="d1" checked>
                                <label class="form-check-label" for="d1">Аттестационный (произв.)</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input doc-checkbox" type="checkbox" value="Отчёт производственная.docx" id="d2" checked>
                                <label class="form-check-label" for="d2">Отчёт (произв.)</label>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-check">
                                <input class="form-check-input doc-checkbox" type="checkbox" value="Аттестационный лист учебная.docx" id="d3">
                                <label class="form-check-label" for="d3">Аттестационный (учебн.)</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input doc-checkbox" type="checkbox" value="Отчёт учебная.docx" id="d4">
                                <label class="form-check-label" for="d4">Отчёт (учебн.)</label>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="btn-group-action d-flex gap-2">
                    <button onclick="saveData()" class="btn btn-success flex-grow-1 py-2">💾 Сохранить</button>
                    <button onclick="generateDoc()" class="btn btn-dark flex-grow-1 py-2">📄 Сгенерировать пакет</button>
                </div>

            </div>
        </div>
    </div>
</div>

<!-- Изменён путь к script.js -->
<script src="/web/script.js"></script>
</body>
</html>
