<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Практика</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body { font-family: sans-serif; padding: 20px; line-height: 1.6; }
    input, select { width: 100%; max-width: 400px; padding: 8px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 4px; }
    button { padding: 10px 15px; cursor: pointer; background-color: #007bff; color: white; border: none; border-radius: 4px; margin-right: 5px; }
    button:hover { background-color: #0056b3; }
    .container { max-width: 500px; margin: auto; }
  </style>
</head>
<body>

<div class="container">
  <h2>Данные практики</h2>

 <label for="studentSelect">Выберите студента из базы:</label><br>
  
<select id="studentSelect">
  <option value="">-- Выберите студента --</option>
  {% for student in students %}
    <option value="{{ student.id }}">
      {{ student.ФИО_обучающегося or student['ФИО_обучающегося'] or "Студент #" ~ student.id }}
    </option>
  {% endfor %}
</select>
  
  <p>Или введите ID вручную:</p>
  <input id="practiceId" placeholder="ID записи" value="1">
  <button onclick="loadData()">📥 Загрузить</button>

  <hr>

  <div id="form" style="display:none">
    <label>ФИО обучающегося:</label><br>
    <input id="fio" placeholder="ФИО обучающегося"><br>
    
    <label>ФИО преподавателя:</label><br>
    <input id="teacher" placeholder="ФИО преподавателя"><br>
    
    <label>Дата начала ПП:</label><br>
    <div style="display: flex; gap: 5px; max-width: 400px;">
        <input id="start_day" placeholder="День">
        <input id="start_month" placeholder="Месяц">
        <input id="start_year" placeholder="Год">
    </div>

    <label>Название организации:</label><br>
    <input id="org_name" placeholder="Организация"><br><br>

    <button onclick="saveData()">💾 Сохранить</button>
    <button onclick="generateDoc()" style="background-color: #28a745;">📄 Сгенерировать документ</button>
  </div>
</div>

<script>
let currentId = null;

// 1. Автоматическая загрузка списка студентов при открытии страницы
window.onload = function() {
    fetch('/') // Мы обращаемся к главной, так как именно она теперь возвращает список
        .then(r => r.json())
        .then(students => {
            const select = document.getElementById("studentSelect");
            students.forEach(s => {
                let opt = document.createElement("option");
                opt.value = s.id;
                
                // Пробуем разные варианты ключа, чтобы точно найти ФИО
                let name = s.ФИО_обучающегося || s['ФИО_обучающегося'] || s.fio || ("Студент №" + s.id);
                
                opt.textContent = name;
                select.appendChild(opt);
            });
        })
        .catch(err => console.error("Ошибка загрузки списка:", err));
};

// 2. Слушатель события: когда выбрали студента в списке
document.getElementById('studentSelect').addEventListener('change', function() {
    if (this.value) {
        document.getElementById("practiceId").value = this.value;
        loadData();
    }
});

// 3. ЗАГРУЗКА данных конкретного студента
function loadData() {
  currentId = document.getElementById("practiceId").value;
  if (!currentId) return;

  // Используем новый эндпоинт /get_student/ который мы добавили в main.py
  fetch(`/get_student/${currentId}`)
    .then(r => r.json())
    .then(data => {
      if (data.detail || data.error) {
        alert("Запись не найдена");
        return;
      }

      // Заполняем поля (ключи соответствуют колонкам в Neon)
      document.getElementById("fio").value = data["ФИО_обучающегося"] || "";
      document.getElementById("teacher").value = data["ФИО_преподавателя"] || "";
      document.getElementById("start_day").value = data["день_начала_ПП"] || "";
      document.getElementById("start_month").value = data["месяц_начала_ПП"] || "";
      document.getElementById("start_year").value = data["год_начала_ПП"] || "";
      document.getElementById("org_name").value = data["название_организации"] || "";

      document.getElementById("form").style.display = "block";
    })
    .catch(err => alert("Ошибка при загрузке: " + err));
}

// 4. СОХРАНЕНИЕ изменений
function saveData() {
  fetch(`/practice/${currentId}`, {
    method: "PUT",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      "ФИО_обучающегося": document.getElementById("fio").value,
      "ФИО_преподавателя": document.getElementById("teacher").value,
      "день_начала_ПП": document.getElementById("start_day").value,
      "месяц_начала_ПП": document.getElementById("start_month").value,
      "год_начала_ПП": document.getElementById("start_year").value,
      "название_организации": document.getElementById("org_name").value
    })
  })
  .then(r => {
      if(r.ok) alert("✅ Данные в базе обновлены!");
      else alert("❌ Ошибка при сохранении");
  });
}

// 5. ГЕНЕРАЦИЯ документа
function generateDoc() {
  window.location = `/generate/${currentId}/Аттестационный лист производственная`;
}
</script>

</body>
</html>
